name: Deploy GitHub Pages

on:
  push:
    branches: [comparison]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install and Build
        run: |
          cd comparison
          pnpm i
          pnpm build
          cd build/client
          printf "\n=== BEFORE ==="
          ls -R
          mkdir -p floppy-disk/assets
          mv assets/* floppy-disk/assets/
          mv favicon.ico floppy-disk/
          rm -rf assets
          cd floppy-disk
          cp ../../../../.gitignore .
          printf "\n=== AFTER ==="
          ls -R
          find . -name "*.html" -exec sed -i 's|/assets/|/floppy-disk/assets/|g' {} +
          find . -name "*.js" -exec sed -i 's|"/assets/|"/floppy-disk/assets/|g' {} +
          find . -name "*.map" -exec sed -i 's|/assets/|/floppy-disk/assets/|g' {} +

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: comparison/build/client/floppy-disk
